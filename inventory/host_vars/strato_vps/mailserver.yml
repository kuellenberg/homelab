mail_hostname: mail.ondre.de
mail_primary_domain: ondre.de

certbot_mail_email: "ondre@ondre.de"

mail_domains:
  - ondre.de
  - faintphotons.de
  - kuellenberg.eu

mail_users:
  - name: ondre
    shell: /bin/bash
    create_home: true
  - name: hasi
    shell: /usr/sbin/nologin
    create_home: true
  - name: andre
    shell: /usr/sbin/nologin
    create_home: true

mail_aliases_local:
  - aliases: ["info", "moobert", "zemightyone","kloetenthaler", "fickbert", "fckbrt", "postmaster", "abuse", "smallbox", "reaktorunfall"]
    targets: ["ondre"]
  - aliases: ["pommel", "mohre"]
    targets: ["hasi"]
  - aliases: ["team"]
    targets: ["hasi", "ondre"]

postfix_virtual_alias_domains:
  - faintphotons.de
  - kuellenberg.eu

dovecot_auth_username_format: "%Ln"
dovecot_lmtp_postmaster_address: "postmaster@ondre.de"
dovecot_user_sieve_location: "file:~/sieve;active=~/.dovecot.sieve"

postfix_mailbox_transport: "lmtp:unix:private/dovecot-lmtp"

mail_aliases_virtual:
  - address: "info@faintphotons.de"
    target: "ondre"
  - address: "kontakt@faintphotons.de"
    target: "ondre"
  - address: "andre@kuellenberg.eu"
    target: "andre"
  - address: "info@kuellenberg.eu"
    target: "andre"
  - address: "postmaster@kuellenberg.eu"
    target: "andre"
  - address: "abuse@kuellenberg.eu"
    target: "andre"

opendkim_domains:
  - domain: ondre.de
    selector: mail2026
  - domain: faintphotons.de
    selector: mail2026
  - domain: kuellenberg.eu
    selector: mail2026

rspamd_controller_password_hash: "{{ vault_rspamd_controller_password_hash }}"