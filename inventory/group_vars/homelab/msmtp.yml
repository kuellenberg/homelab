msmtp_:
  account: "mail.ondre.de"
  smtp_server: "mail.ondre.de"
  smtp_port: "587"
  smtp_user: "ondre"
  smtp_pass: "{{ vault_msmtp_ondre_smtp_pass }}"
  start_tls: "on"
  from_address: "smallbox@ondre.de"

  users:
    - owner: "nut"
      group: "nut"
      mode: "0600"
      dest: "/var/lib/nut/.msmtprc"
      from_address: "reaktorunfall@ondre.de"
    - owner: "root"
      group: "root"
      mode: "0600"
      dest: "/etc/msmtprc"
      from_address: "smallbox@ondre.de"
