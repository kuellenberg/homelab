# roles/fail2ban/handlers/main.yml

- name: Validate fail2ban config
  become: true
  ansible.builtin.command: fail2ban-client -t
  changed_when: false
  listen: Validate and restart fail2ban

- name: Restart fail2ban
  become: true
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  listen: Validate and restart fail2ban
