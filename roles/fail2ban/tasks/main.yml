- name: Install fail2ban
  become: true
  ansible.builtin.apt:
    name:
      - fail2ban
      - python3-systemd
    state: present
    update_cache: true

- name: Install fail2ban jail config
  become: true
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.d/00-local.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Validate and restart fail2ban

- name: Enable and start fail2ban
  become: true
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
