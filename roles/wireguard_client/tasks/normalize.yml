---
- name: WireGuard client | Build effective instance list
  ansible.builtin.set_fact:
    wireguard_effective_instances: >-
      {{
        wireguard_instances
        | default([
            {
              'name': wireguard_interface,
              'interface': wireguard_interface,
              'address': wireguard_address,
              'server_interface': wireguard_primary_interface | default('wg0'),
              'endpoint_host': wireguard_endpoint_host,
              'endpoint_port': wireguard_endpoint_port,
              'allowed_ips': wireguard_allowed_ips,
              'persistent_keepalive': wireguard_persistent_keepalive | default(25),
              'masq_interface': wireguard_masq_interface | default(omit),
              'enable_forwarding': wireguard_enable_forwarding | default(true),
              'enable_masquerade': wireguard_enable_masquerade | default(true)
            }
          ])
      }}

- name: WireGuard client | Select primary interface for legacy facts
  ansible.builtin.set_fact:
    wireguard_primary_client_interface: >-
      {{
        wireguard_primary_client_interface
        | default(
            wireguard_interface
            | default((wireguard_effective_instances | first).interface)
          )
      }}