---
- name: WireGuard server | Normalize variables
  ansible.builtin.include_tasks: normalize.yml

- name: WireGuard server | Deploy configs for all instances
  ansible.builtin.include_tasks: instance_config.yml
  loop: "{{ wireguard_effective_instances }}"
  loop_control:
    loop_var: wireguard_instance
    label: "{{ wireguard_instance.interface }}"

- name: Ensure IP forwarding is enabled (runtime)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true

- name: Ensure IP forwarding is enabled (config file)
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: '^net.ipv4.ip_forward'
    line: 'net.ipv4.ip_forward = 1'
    state: present