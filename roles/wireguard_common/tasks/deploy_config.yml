---
- name: Deploy WireGuard config
  ansible.builtin.template:
    src: "{{ wireguard_config_template }}"
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  register: wireguard_config_deploy
  no_log: true
  tags: [wireguard_conf]

- name: Ensure WireGuard service is enabled and started
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
  tags: [wireguard_conf]

- name: Restart WireGuard interface when config changed
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    state: restarted
  when:
    - wireguard_config_deploy.changed
    - not ansible_check_mode
  tags: [wireguard_conf]