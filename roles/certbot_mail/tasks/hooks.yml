---

- name: Ensure certbot hook directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/letsencrypt/renewal-hooks/pre
    - /etc/letsencrypt/renewal-hooks/post
    - /etc/letsencrypt/renewal-hooks/deploy

- name: Deploy pre-hook to stop Traefik
  ansible.builtin.template:
    src: stop-traefik.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/pre/stop-traefik.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy post-hook to start Traefik
  ansible.builtin.template:
    src: start-traefik.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/post/start-traefik.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy deploy-hook to reload mail services
  ansible.builtin.template:
    src: reload-mail-services.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-mail-services.sh
    owner: root
    group: root
    mode: "0755"